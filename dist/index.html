    <style>
      /* Base Style untuk mencegah 'jump' saat loading (Apple Smoothness) */
      :root {
        --system-bg: #F5F5F7;
      }

      * {
        -webkit-tap-highlight-color: transparent; /* Hilangkan kotak biru saat klik di HP (Apple Style) */
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background-color: var(--system-bg);
        margin: 0;
        padding: 0;
        overscroll-behavior-y: none; /* Mencegah pull-to-refresh yang merusak feel WebApp */
      }

      /* Animasi Bernyawa saat aplikasi pertama kali muncul */
      #root {
        opacity: 0;
        animation: fadeInApp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes fadeInApp {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
      }

      /* Scrollbar ala Huawei/Mac (Sangat Tipis & Elegan) */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: #D1D1D6;
        border-radius: 10px;
      }
    </style>

  </head>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
        });
      }
    </script>
  </body>
